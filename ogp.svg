<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0f"/>
      <stop offset="100%" style="stop-color:#1c1c22"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 装飾ライン -->
  <rect x="0" y="0" width="6" height="630" fill="#c8a96e"/>
  <rect x="0" y="580" width="1200" height="1" fill="#2a2a35"/>
  <!-- メインタイトル -->
  <text x="80" y="220" font-size="88" font-family="serif" font-weight="bold" fill="#c8a96e" letter-spacing="8">政治家マップ</text>
  <!-- サブタイトル -->
  <text x="82" y="300" font-size="36" font-family="sans-serif" fill="#e8e6e0" letter-spacing="2">国会議員の発言をリアルタイム検索</text>
  <!-- 特徴テキスト -->
  <text x="82" y="390" font-size="26" font-family="sans-serif" fill="#7a7870">✓ 発言者名・キーワードで横断検索</text>
  <text x="82" y="435" font-size="26" font-family="sans-serif" fill="#7a7870">✓ 国会会議録（国立国会図書館）一次ソース</text>
  <text x="82" y="480" font-size="26" font-family="sans-serif" fill="#7a7870">✓ 一貫性スコア・ワードクラウドで可視化</text>
  <!-- URL -->
  <text x="82" y="560" font-size="22" font-family="monospace" fill="#7eb8c9">seijika-map.github.io</text>
</svg>
